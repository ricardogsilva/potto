<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ _("Login") }} – {{ title }}</title>
    <link rel="shortcut icon" href="{{ url_for('static', path='/img/favicon.ico') }}" type="image/x-icon">
    <link href="{{ url_for('static', path='/css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', path='/css/bootstrap-icons.min.css') }}" rel="stylesheet">
</head>
<body class="d-flex align-items-center min-vh-100 bg-light">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-sm-8 col-md-6 col-lg-4">
            <div class="text-center mb-4">
                <a href="{{ url_for('landing-page') }}">
                    <img src="{{ login_logo_url or logo_url or url_for('static', path='/img/potto-head-logo.png') }}"
                         alt="{{ title }}" height="80">
                </a>
            </div>
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4 fs-5">{{ _("Login to your account") }}</h2>
                    {% if error %}
                        <div class="alert alert-danger alert-dismissible" role="alert">
                            <i class="bi bi-exclamation-triangle-fill me-2" aria-hidden="true"></i>
                            {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="{{ _('Close') }}"></button>
                        </div>
                    {% endif %}
                    <form action="{{ request.url }}" method="POST">
                        <div class="mb-3">
                            <label for="username" class="form-label">{{ _("Username") }}</label>
                            <input type="text"
                                   id="username"
                                   name="username"
                                   class="form-control {% if form_errors and form_errors.has('username') %}is-invalid{% endif %}"
                                   placeholder="{{ _('Username') }}"
                                   autocomplete="username"
                                   autofocus>
                            {% if form_errors and form_errors.has('username') %}
                                <div class="invalid-feedback">{{ form_errors.msg('username') }}</div>
                            {% endif %}
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">{{ _("Password") }}</label>
                            <input type="password"
                                   id="password"
                                   name="password"
                                   class="form-control {% if form_errors and form_errors.has('password') %}is-invalid{% endif %}"
                                   placeholder="{{ _('Password') }}"
                                   autocomplete="current-password">
                            {% if form_errors and form_errors.has('password') %}
                                <div class="invalid-feedback">{{ form_errors.msg('password') }}</div>
                            {% endif %}
                        </div>
                        <div class="mb-3">
                            <div class="form-check">
                                <input id="remember_me" name="remember_me" type="checkbox" class="form-check-input">
                                <label for="remember_me" class="form-check-label">{{ _("Remember me") }}</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right me-1" aria-hidden="true"></i>
                            {{ _("Sign in") }}
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', path='/js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
