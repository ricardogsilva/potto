# Bare pygeoapi configuration file that only contains the fields required by Potto
#

resources:
    simplest-obs:
      type: collection
      title: Simplest observations
      description: Coolest observations
      extents:
        spatial:
          bbox: [-122, 43, -75, 49]
      providers:
        - type: feature
          name: potto.pygeoapi_providers.PygeoapiConfigWktFeatureProvider
          data:
            features:
              - id: 371
                geometry: "POINT (-75 45)"
                properties:
                  stn_id: 35
                  datetime: "2001-10-30T14:24:55Z"
                  value: 89.9
              - id: 377
                geometry: "POINT (-75 45)"
                properties:
                  stn_id: 35
                  datetime: "2002-10-30T18:31:38Z"
                  value: 93.9
              - id: 238
                geometry: "POINT (-79 43)"
                properties:
                  stn_id: 2147
                  datetime: "2007-10-30T08:57:29Z"
                  value: 103.5
              - id: 297
                geometry: "POINT (-79 43)"
                properties:
                  stn_id: 2147
                  datetime: "2003-10-30T07:37:29Z"
                  value: 93.5
              - id: 964
                geometry: "POINT (-122 49)"
                properties:
                  stn_id: 604
                  datetime: "2000-10-30T18:24:39Z"
                  value: 99.9

    simple-obs:
      type: collection
      title: Simple observations
      description: Even cooler observations
      extents:
        spatial:
          bbox: [-122, 43, -75, 49]
      providers:
        - type: feature
          name: potto.pygeoapi_providers.PygeoapiConfigGeoJsonFeatureProvider
          data:
            # this was generated with ogr2ogr, from the obs.csv dataset:
            # ogr2ogr \
            #   -of GeoJSON \
            #   /vsistdout/  obs.csv \
            #   -lco ID_FIELD=id \
            #   -oo X_POSSIBLE_NAMES=long \
            #   -oo Y_POSSIBLE_NAMES=lat \
            #   -oo KEEP_GEOM_COLUMNS=no \
            #   -oo AUTODETECT_TYPE=yes
            features:
              - type: "Feature"
                id: 371
                properties:
                  stn_id: 35
                  datetime: "2001-10-30T14:24:55Z"
                  value: 89.9
                geometry:
                  type: "Point"
                  coordinates: [ -75.0, 45.0 ]
              - type: "Feature"
                id: 377
                properties:
                  stn_id: 35
                  datetime: "2002-10-30T18:31:38Z"
                  value: 93.9
                geometry:
                  type: "Point"
                  coordinates: [ -75.0, 45.0 ]
              - type: "Feature"
                id: 238
                properties:
                  stn_id: 2147
                  datetime: "2007-10-30T08:57:29Z"
                  value: 103.5
                geometry:
                  type: "Point"
                  coordinates: [ -79.0, 43.0 ]
              - type: "Feature"
                id: 297
                properties:
                  stn_id: 2147
                  datetime: "2003-10-30T07:37:29Z"
                  value: 93.5
                geometry:
                  type: "Point"
                  coordinates: [ -79.0, 43.0 ]
              - type: "Feature"
                id: 964
                properties:
                  stn_id: 604
                  datetime: "2000-10-30T18:24:39Z"
                  value: 99.9
                geometry:
                  type: "Point"
                  coordinates: [ -122.0, 49.0 ]

    obs:
        type: collection
        title: Observations
        description: My cool observations
        keywords:
            - observations
            - monitoring
        linked-data:
            context:
                - datetime: https://schema.org/DateTime
                - vocab: https://example.com/vocab#
                  stn_id: "vocab:stn_id"
                  value: "vocab:value"
        links:
            - type: text/csv
              rel: canonical
              title: data
              href: https://github.com/mapserver/mapserver/blob/branch-7-0/msautotest/wxs/data/obs.csv
              hreflang: en-US
            - type: text/csv
              rel: alternate
              title: data
              href: https://raw.githubusercontent.com/mapserver/mapserver/branch-7-0/msautotest/wxs/data/obs.csv
              hreflang: en-US
        extents:
            spatial:
                bbox: [-180,-90,180,90]
                crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
            temporal:
                begin: 2000-10-30T18:24:39Z
                end: 2007-10-30T08:57:29Z
        providers:
            - type: feature
              name: CSV
              data: ${PYGEOAPI_ROOT}/tests/data/obs.csv
              id_field: id
              geometry:
                  x_field: long
                  y_field: lat

    lakes:
        type: collection
        title:
            en: Large Lakes
            fr: Grands Lacs
        description:
            en: lakes of the world, public domain
            fr: lacs du monde, domaine public
        keywords:
            en:
                - lakes
                - water bodies
            fr:
                - lacs
                - plans d'eau
        links:
            - type: text/html
              rel: canonical
              title: information
              href: http://www.naturalearthdata.com/
              hreflang: en-US
        extents:
            spatial:
                bbox: [-180,-90,180,90]
                crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
            temporal:
                begin: 2011-11-11T11:11:11Z
                end: null  # or empty (either means open ended)
        providers:
            - type: feature
              name: GeoJSON
              data: ${PYGEOAPI_ROOT}/tests/data/ne_110m_lakes.geojson
              id_field: id
              title_field: name

    mapserver_world_map:
        type: collection
        title: MapServer demo WMS world map
        description: MapServer demo WMS world map
        keywords:
            - MapServer
            - world map
        links:
            - type: text/html
              rel: canonical
              title: information
              href: https://demo.mapserver.org
              hreflang: en-US
        extents:
            spatial:
                bbox: [-180,-90,180,90]
                crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
        providers:
            - type: map
              name: WMSFacade
              data: https://demo.mapserver.org/cgi-bin/msautotest
              options:
                  layer: world_latlong
                  style: default
              format:
                    name: png
                    mimetype: image/png

    gdps-temperature:
        type: collection
        title: Global Deterministic Prediction System sample
        description: Global Deterministic Prediction System sample
        keywords:
            - gdps
            - global
        extents:
            spatial:
                bbox: [-180,-90,180,90]
                crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
        links:
            - type: text/html
              rel: canonical
              title: information
              href: https://eccc-msc.github.io/open-data/msc-data/nwp_gdps/readme_gdps_en
              hreflang: en-CA
        providers:
            - type: coverage
              name: rasterio
              data: ${PYGEOAPI_ROOT}/tests/data/CMC_glb_TMP_TGL_2_latlon.15x.15_2020081000_P000.grib2
              options:
                  DATA_ENCODING: COMPLEX_PACKING
              format:
                  name: GRIB
                  mimetype: application/x-grib2

    test-data:
        type: stac-collection
        title: pygeoapi test data
        description: pygeoapi test data
        keywords:
            - poi
            - portugal
        links:
            - type: text/html
              rel: canonical
              title: information
              href: https://github.com/geopython/pygeoapi/tree/master/tests/data
              hreflang: en-US
        extents:
            spatial:
                bbox: [-180,-90,180,90]
                crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
        providers:
            - type: stac
              name: FileSystem
              data: ${PYGEOAPI_ROOT}/tests/data
              file_types:
                  - .gpkg
                  - .sqlite
                  - .csv
                  - .grib2
                  - .tif
                  - .shp

    canada-metadata:
        type: collection
        title:
            en: Open Canada sample data
            fr: Exemple de donn\u00e9es Canada Ouvert
        description:
            en: Sample metadata records from open.canada.ca
            fr: Exemples d'enregistrements de m\u00e9tadonn\u00e9es sur ouvert.canada.ca
        keywords:
            en:
                - canada
                - open data
            fr:
                - canada
                - donn\u00e9es ouvertes
        links:
            - type: text/html
              rel: canonical
              title: information
              href: https://open.canada.ca/en/open-data
              hreflang: en-CA
            - type: text/html
              rel: alternate
              title: informations
              href: https://ouvert.canada.ca/fr/donnees-ouvertes
              hreflang: fr-CA
        extents:
            spatial:
                bbox: [-180,-90,180,90]
                crs: http://www.opengis.net/def/crs/OGC/1.3/CRS84
        providers:
            - type: record
              name: TinyDBCatalogue
              data: ${PYGEOAPI_ROOT}/tests/data/open.canada.ca/sample-records.tinydb
              id_field: externalId
              time_field: created
              title_field: title

    hello-world:
        type: process
        processor:
            name: HelloWorld
